name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build portfolio (static export)
        # Custom domain (www.huudaodinh.site) serves at the root, so no basePath.
        run: pnpm --filter @kidcenter/portfolio build
      - name: Build family app (static export, served at /quest)
        env:
          NEXT_PUBLIC_BASE_PATH: /quest
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm --filter @kidcenter/family build
      - name: Assemble family into portfolio/out/quest
        run: |
          rm -rf apps/portfolio/out/quest
          cp -r apps/family/out apps/portfolio/out/quest
      - name: Build study app (static export, served at /study)
        # Auth-gated (Google login + parent-only RLS); data loads from Supabase at
        # runtime, so no school records are baked into the static bundle.
        env:
          NEXT_PUBLIC_BASE_PATH: /study
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm --filter @kidcenter/study build
      - name: Assemble study into portfolio/out/study
        run: |
          rm -rf apps/portfolio/out/study
          cp -r apps/study/out apps/portfolio/out/study
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/portfolio/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
